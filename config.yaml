# VLM Project Configuration
# Balanced temporal reasoning for T4 (avoid over-long, first-frame-heavy outputs)

model:
  model_name: "Qwen/Qwen3-VL-2B-Instruct"
  device: "cuda"
  torch_dtype: "float16"
  use_flash_attention: true

  # Generation settings (balanced detail and latency)
  max_new_tokens: 4096
  temperature: 0.1
  top_p: 0.8
  top_k: 10
  repetition_penalty: 1.2

  # Keep output concise/stable on T4
  enable_thinking: false
  preserve_thinking: false

video:
  # Temporal sampling tuned for summary-level understanding
  frame_stride: 2
  max_frames: 64
  target_fps: 4
  resolution: 320

  # Sampling strategy
  sampling_strategy: "uniform"

prompting:
  system_prompt: |
    You are a surveillance video analysis system.

    Task:
    Observe the entire video and extract person-level information for each individual appearing in the video.

    Requirements:
    1. Identify each person appearing in the video and assign a temporary ID: person_1, person_2, person_3, ...
    2. For each person, describe clearly:
       - estimated gender if observable
       - estimated age if observable
       - upper clothing
       - lower clothing
       - accessories (hat, backpack, bag, mask, glasses, etc.)
       - distinctive appearance notes
       - relative position in the frame
       - main actions
       - nearby context
       - nearby people or objects
       - interactions with others if any
    3. If a person appears multiple times in the same video, keep the same ID whenever possible.
    4. Do not provide only a generic whole-video description. Separate output by person.
    5. If uncertain, write "không rõ" instead of guessing.

    Output must be valid JSON only, following this schema exactly:

    {
      "video_summary": "brief full-video summary",
      "persons": [
        {
          "person_id": "person_1",
          "gender_estimate": "",
          "age_estimate": "",
          "upper_clothing": [],
          "lower_clothing": [],
          "accessories": [],
          "appearance_notes": [],
          "relative_position": "",
          "main_actions": [],
          "nearby_objects": [],
          "nearby_people": [],
          "interactions": [],
          "local_background": [],
          "time_ranges": [],
          "confidence": 0.0
        }
      ]
    }

  question_templates:
    general: |
      Describe the video from start to end using 10-20 second segments.
      Focus on main actions and transitions.

    action: |
      Describe the key actions step-by-step by segment.
      Prioritize major motion changes over micro-details.

    detailed: |
      Describe the video in detail by segment (10-20 seconds each):
      - Main scene and action
      - Clearly visible people only
      - Important interaction changes

    people: |
      Track clearly visible people across the video.

      Requirements:
      - Use segment-level timestamps (10-20s).
      - Keep person IDs consistent and limited.
      - If uncertain, mark as unclear.

    reasoning: |
      Reason chronologically by segment.
      First identify duration, then summarize each segment.
      Verify that start, middle, and end are all covered.

  cot_instruction: |
     Analyze the full video chronologically using segment-level reasoning:

     1. Identify total duration.
     2. Split into coarse segments (10-20 seconds).
     3. For each segment, report key action and clearly visible people.
     4. Do not invent identities; mark uncertainty explicitly.
     5. End with a concise overall summary.

data:
  video_folder: "data/"
  output_json: "outputs/dataset.json"
  format: "sharegpt4video"

dataset_builder:
  generate_reasoning: true
  num_reasoning_turns: 3
  include_temporal: true
  include_bbox: false

inference:
  batch_size: 1
  save_frames: false
  verbose: true